<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>osm-static-map-generator WASM Test</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        #status { margin: 1rem 0; padding: 0.5rem; background: #f0f0f0; }
        #status.error { background: #fdd; color: #900; }
        #status.success { background: #dfd; color: #090; }
        #map-output { border: 1px solid #ccc; max-width: 100%; }
    </style>
</head>
<body>
    <h1>osm-static-map-generator WASM Test</h1>
    <div id="status">Initializing...</div>
    <div id="timing"></div>
    <img id="map-output" alt="Generated map will appear here">

    <script type="module">
        import { createMapGenerator } from '../lib/index.mjs';

        const statusEl = document.getElementById('status');
        const timingEl = document.getElementById('timing');
        const imgEl = document.getElementById('map-output');

        function setStatus(msg, type) {
            statusEl.textContent = msg;
            statusEl.className = type || '';
        }

        try {
            setStatus('Loading WASM module...');
            const startInit = performance.now();

            const { generateMap } = await createMapGenerator();
            const initTime = performance.now() - startInit;

            setStatus(`Module loaded in ${initTime.toFixed(0)}ms. Generating map...`);
            const startRender = performance.now();

            const result = await generateMap({
                width: 800,
                height: 600,
                center: { x: -0.1276, y: 51.5074 },
                zoom: 13
            });

            const elapsed = performance.now() - startRender;
            const blob = new Blob([result.buffer], { type: 'image/png' });
            imgEl.src = URL.createObjectURL(blob);

            setStatus(
                `OK: ${result.buffer.length} bytes, rendered in ${elapsed.toFixed(0)}ms` +
                (result.failedTileCount > 0 ? ` (${result.failedTileCount} tiles failed)` : ''),
                'success'
            );
            timingEl.textContent =
                `Init: ${initTime.toFixed(0)}ms | Render: ${elapsed.toFixed(0)}ms`;
        } catch (e) {
            setStatus(`Error: ${e.message}`, 'error');
            console.error(e);
        }
    </script>
</body>
</html>
